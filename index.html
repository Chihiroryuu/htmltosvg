<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVG Animation Studio</title>

<link rel="stylesheet" href="style.css">

<!-- GIF -->
<script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>

<!-- HTML2CANVAS -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<!-- FFMPEG -->
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left-panel">

        <h2>CSS Animation</h2>

        <textarea id="cssEditor">
.shackle{
    transform-origin:120px 120px;
    animation:unlock 2s infinite ease-in-out;
}

@keyframes unlock{

    0%{
        transform:rotate(0deg);
    }

    50%{
        transform:
            rotate(-20deg)
            translate(-10px,-10px);
    }

    100%{
        transform:rotate(0deg);
    }
}
        </textarea>

        <div class="toolbar">

            <button onclick="applyCSS()">
                Apply
            </button>

            <button onclick="exportSVG()">
                SVG
            </button>

            <button onclick="exportGIF()">
                GIF
            </button>

            <button onclick="exportMP4()">
                MP4
            </button>

        </div>

        <div id="status"></div>

    </div>

    <!-- RIGHT -->
    <div class="right-panel">

        <div id="preview">

            <svg
                id="svgCanvas"
                viewBox="0 0 300 320">

                <style id="dynamicStyle"></style>

                <!-- SHACKLE -->
                <g class="shackle">

                    <path d="
                        M95 130
                        L95 85
                        A55 55 0 0 1 205 85
                        L205 130
                    "
                    fill="none"
                    stroke="#777"
                    stroke-width="22"
                    stroke-linecap="round"/>

                </g>

                <!-- BODY -->
                <rect
                    x="55"
                    y="120"
                    width="190"
                    height="150"
                    rx="14"
                    fill="#F7C600"
                />

                <!-- KEYHOLE -->
                <circle
                    cx="150"
                    cy="180"
                    r="18"
                    fill="#555"
                />

            </svg>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
