<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Lock Animator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #F5A623;
      --gold-light: #FFD580;
      --navy: #0D1B2A;
      --navy-mid: #162032;
      --navy-soft: #1E2E42;
      --panel-bg: #F4F6FA;
      --border: rgba(255,255,255,0.08);
      --text-dim: rgba(255,255,255,0.45);
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--navy);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── LEFT PANEL ── */
    .editor-panel {
      width: 420px;
      min-width: 320px;
      background: var(--navy-mid);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .panel-header {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lock-icon {
      width: 36px; height: 36px;
      background: var(--gold);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .lock-icon svg { width: 18px; height: 18px; fill: var(--navy); }

    .panel-header h1 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .panel-header span {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--text-dim);
      display: block;
      margin-top: 1px;
    }

    .editor-wrapper {
      flex: 1;
      padding: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .editor-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    textarea#cssEditor {
      flex: 1;
      background: var(--navy);
      color: #7DDFA3;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      line-height: 1.7;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea#cssEditor:focus {
      border-color: rgba(245,166,35,0.4);
    }

    .toolbar-area {
      padding: 14px 16px 16px;
      border-top: 1px solid var(--border);
    }

    .btn-apply {
      width: 100%;
      padding: 11px;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Sora', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.18s;
      margin-bottom: 10px;
    }

    .btn-apply:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-apply:active { transform: translateY(0); }

    .export-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn-export {
      padding: 9px 6px;
      background: var(--navy-soft);
      color: rgba(255,255,255,0.8);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Sora', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }

    .btn-export:hover:not(:disabled) {
      background: rgba(245,166,35,0.12);
      border-color: rgba(245,166,35,0.35);
      color: var(--gold);
    }

    .btn-export:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-export .icon { font-size: 14px; }

    #status {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.55);
      text-align: center;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    #status.ok   { color: #7DDFA3; }
    #status.err  { color: #F07070; }
    #status.info { color: var(--gold-light); }

    /* ── RIGHT PANEL ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      position: relative;
    }

    .preview-bg {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 60% 35%, rgba(245,166,35,0.06) 0%, transparent 55%),
        radial-gradient(circle at 20% 70%, rgba(100,160,255,0.05) 0%, transparent 45%);
      pointer-events: none;
    }

    .preview-label {
      position: absolute;
      top: 22px; left: 24px;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #previewBox {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 44px 40px;
      box-shadow: 0 40px 80px -20px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
    }

    #svgCanvas {
      width: 240px;
      height: auto;
      display: block;
    }

    .preview-hint {
      position: absolute;
      bottom: 22px;
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      body { flex-direction: column; height: auto; overflow: auto; }
      .editor-panel { width: 100%; min-width: unset; }
      textarea#cssEditor { height: 220px; }
      .preview-panel { height: 380px; }
    }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
      display: none;
    }
    .progress-bar-wrap.visible { display: block; }
    .progress-bar {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width 0.1s linear;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<!-- ══ LEFT: CSS EDITOR ══ -->
<div class="editor-panel">
  <div class="panel-header">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 11H6V9a6 6 0 1 1 12 0v2zm-6 7a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm6 2H6a2 2 0 0 1-2-2v-7h16v7a2 2 0 0 1-2 2z"/>
      </svg>
    </div>
    <div>
      <h1>SVG Lock Animator</h1>
      <span>Edit CSS · Preview · Export</span>
    </div>
  </div>

  <div class="editor-wrapper">
    <div class="editor-label">CSS Animation</div>
    <textarea id="cssEditor" spellcheck="false"></textarea>
  </div>

  <div class="toolbar-area">
    <button class="btn-apply" id="applyBtn">▶ Apply &amp; Preview</button>

    <div class="export-group">
      <button class="btn-export" id="exportSvgBtn">
        <span class="icon">📄</span> SVG
      </button>
      <button class="btn-export" id="exportGifBtn">
        <span class="icon">🎞️</span> GIF
      </button>
      <button class="btn-export" id="exportMp4Btn">
        <span class="icon">🎬</span> MP4
      </button>
    </div>

    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="status" class="ok">✓ Siap — klik Apply untuk menjalankan animasi</div>
  </div>
</div>

<!-- ══ RIGHT: PREVIEW ══ -->
<div class="preview-panel">
  <div class="preview-bg"></div>
  <div class="preview-label">Live Preview</div>

  <div id="previewBox">
    <svg id="svgCanvas" viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg">
      <style id="dynamicStyle"></style>

      <!-- Shackle -->
      <g class="shackle">
        <path d="M95 130 L95 85 A55 55 0 0 1 205 85 L205 130"
              fill="none" stroke="#888" stroke-width="22" stroke-linecap="round"/>
        <path d="M95 130 L95 85 A55 55 0 0 1 205 85 L205 130"
              fill="none" stroke="#aaa" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
      </g>

      <!-- Body -->
      <rect x="55" y="120" rx="16" ry="16" width="190" height="150" fill="#F7C600"/>
      <!-- Highlight -->
      <path d="M65 130 Q90 120 112 132 Q82 172 66 192 Z" fill="#FFD93D" opacity="0.6"/>
      <!-- Shadow -->
      <path d="M55 252 Q150 237 245 172 L245 270 Q55 270 55 252 Z" fill="#E5A800" opacity="0.7"/>

      <!-- Keyhole -->
      <circle cx="150" cy="178" r="20" fill="#4A3B00"/>
      <circle cx="150" cy="178" r="17" fill="#3A2D00"/>
      <path d="M150 192 L137 234 L163 234 Z" fill="#3A2D00"/>
      <!-- Keyhole shine -->
      <circle cx="144" cy="172" r="4" fill="rgba(255,255,255,0.12)"/>
    </svg>
  </div>

  <div class="preview-hint">Animasi berjalan secara real-time</div>
</div>

<script>
// ═══════════════════════════════════════════════
// ELEMENTS
// ═══════════════════════════════════════════════
const cssEditor    = document.getElementById('cssEditor');
const dynamicStyle = document.getElementById('dynamicStyle');
const statusDiv    = document.getElementById('status');
const previewBox   = document.getElementById('previewBox');
const progressWrap = document.getElementById('progressWrap');
const progressBar  = document.getElementById('progressBar');

const applyBtn      = document.getElementById('applyBtn');
const exportSvgBtn  = document.getElementById('exportSvgBtn');
const exportGifBtn  = document.getElementById('exportGifBtn');
const exportMp4Btn  = document.getElementById('exportMp4Btn');
const allBtns       = [applyBtn, exportSvgBtn, exportGifBtn, exportMp4Btn];

// ═══════════════════════════════════════════════
// DEFAULT CSS
// ═══════════════════════════════════════════════
const DEFAULT_CSS = `.shackle {
  transform-origin: 150px 130px;
  animation: unlock 2.4s infinite ease-in-out;
}

@keyframes unlock {
  0%   { transform: rotate(0deg) translateY(0px); }
  25%  { transform: rotate(-24deg) translate(-10px, -10px); }
  50%  { transform: rotate(-24deg) translate(-10px, -10px); }
  75%  { transform: rotate(4deg) translate(2px, -2px); }
  100% { transform: rotate(0deg) translateY(0px); }
}
`;

cssEditor.value = DEFAULT_CSS;
applyCSS();

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function setStatus(msg, type = 'ok') {
  statusDiv.textContent = msg;
  statusDiv.className = type;
}

function setProgress(pct) {
  if (pct <= 0) {
    progressWrap.classList.remove('visible');
    progressBar.style.width = '0%';
  } else {
    progressWrap.classList.add('visible');
    progressBar.style.width = Math.min(pct, 100) + '%';
  }
}

function setBusy(busy) {
  allBtns.forEach(b => b.disabled = busy);
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ═══════════════════════════════════════════════
// APPLY CSS
// ═══════════════════════════════════════════════
function applyCSS() {
  try {
    dynamicStyle.innerHTML = cssEditor.value;
    setStatus('✓ CSS diterapkan — animasi berjalan', 'ok');
  } catch(e) {
    setStatus('✕ Error: ' + e.message, 'err');
  }
}

// ═══════════════════════════════════════════════
// EXPORT SVG
// ═══════════════════════════════════════════════
function exportSVG() {
  try {
    const svgEl  = document.getElementById('svgCanvas');
    const clone  = svgEl.cloneNode(true);
    const serial = new XMLSerializer();
    const svgStr = '<?xml version="1.0" encoding="UTF-8"?>\n' + serial.serializeToString(clone);
    downloadBlob(new Blob([svgStr], { type: 'image/svg+xml' }), 'lock-animation.svg');
    setStatus('📄 SVG berhasil diekspor!', 'ok');
  } catch(e) {
    setStatus('✕ Gagal export SVG: ' + e.message, 'err');
  }
}

// ═══════════════════════════════════════════════
// EXPORT GIF
// ═══════════════════════════════════════════════
async function exportGIF() {
  if (typeof GIF === 'undefined') {
    setStatus('✕ Library GIF belum dimuat. Refresh halaman.', 'err'); return;
  }
  if (typeof html2canvas === 'undefined') {
    setStatus('✕ html2canvas belum dimuat.', 'err'); return;
  }

  setBusy(true);
  const FRAMES      = 36;
  const DURATION_MS = 2400;
  const FRAME_DELAY = Math.round(DURATION_MS / FRAMES);

  setStatus('🎞️ Mempersiapkan capture...', 'info');
  setProgress(2);

  const gif = new GIF({
    workers: 2,
    quality: 8,
    width: 320,
    height: 320,
    workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js',
    background: '#162032',
    transparent: null,
    repeat: 0
  });

  // Ambil semua frame
  const frames = [];
  for (let i = 0; i < FRAMES; i++) {
    try {
      const canvas = await html2canvas(previewBox, {
        scale: 1,
        backgroundColor: '#162032',
        logging: false,
        useCORS: true
      });
      frames.push(canvas);

      const pct = Math.round((i + 1) / FRAMES * 60);
      setProgress(pct);
      setStatus(`🎞️ Merekam frame ${i + 1} / ${FRAMES}...`, 'info');

      await wait(FRAME_DELAY);
    } catch(err) {
      setStatus('✕ Gagal capture frame: ' + err.message, 'err');
      setBusy(false); setProgress(0); return;
    }
  }

  // Tambahkan frame ke GIF
  frames.forEach(canvas => gif.addFrame(canvas, { delay: FRAME_DELAY }));

  setStatus('⚙️ Mengompres GIF...', 'info');
  setProgress(70);

  await new Promise((resolve, reject) => {
    const timeout = setTimeout(() => reject(new Error('Timeout (15 detik)')), 15000);

    gif.on('progress', p => setProgress(70 + Math.round(p * 28)));
    gif.on('finished', blob => {
      clearTimeout(timeout);
      downloadBlob(blob, 'lock-animation.gif');
      setStatus('✓ GIF berhasil diekspor!', 'ok');
      setProgress(100);
      setTimeout(() => setProgress(0), 1200);
      setBusy(false);
      resolve();
    });
    gif.on('error', err => {
      clearTimeout(timeout);
      reject(err);
    });

    gif.render();
  }).catch(err => {
    setStatus('✕ Gagal buat GIF: ' + err.message, 'err');
    setProgress(0); setBusy(false);
  });
}

// ═══════════════════════════════════════════════
// EXPORT MP4  (via canvas recording)
// ═══════════════════════════════════════════════
async function exportMP4() {
  // Cek MediaRecorder + canvas support
  if (!window.MediaRecorder) {
    setStatus('✕ Browser tidak mendukung MediaRecorder.', 'err'); return;
  }
  if (typeof html2canvas === 'undefined') {
    setStatus('✕ html2canvas belum dimuat.', 'err'); return;
  }

  setBusy(true);
  setStatus('🎬 Menyiapkan canvas recording...', 'info');
  setProgress(5);

  try {
    // Buat canvas offline berukuran tetap
    const DURATION_MS = 2500; // 1 loop penuh
    const FPS         = 30;
    const W = 320, H = 320;

    const offscreen = document.createElement('canvas');
    offscreen.width  = W;
    offscreen.height = H;
    const ctx = offscreen.getContext('2d');

    // Rekam dari canvas stream
    const stream   = offscreen.captureStream(FPS);
    const mimeType = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']
                       .find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';

    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 2_500_000 });
    const chunks   = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

    recorder.start(50);
    setProgress(10);

    const totalFrames = Math.ceil((DURATION_MS / 1000) * FPS);
    const frameGap    = Math.round(DURATION_MS / totalFrames);

    for (let i = 0; i < totalFrames; i++) {
      const snap = await html2canvas(previewBox, {
        scale: W / previewBox.offsetWidth,
        backgroundColor: '#162032',
        logging: false,
        useCORS: true
      });
      ctx.drawImage(snap, 0, 0, W, H);

      const pct = 10 + Math.round((i + 1) / totalFrames * 75);
      setProgress(pct);
      setStatus(`🎬 Frame ${i + 1} / ${totalFrames}`, 'info');
      await wait(frameGap);
    }

    recorder.stop();
    setStatus('⚙️ Memfinalisasi video...', 'info');
    setProgress(90);

    await new Promise((res, rej) => {
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: mimeType });
        const ext  = mimeType.includes('mp4') ? 'mp4' : 'webm';
        downloadBlob(blob, `lock-animation.${ext}`);
        setStatus(`✓ Video (${ext.toUpperCase()}) berhasil diekspor!`, 'ok');
        setProgress(100);
        setTimeout(() => setProgress(0), 1200);
        setBusy(false);
        res();
      };
      recorder.onerror = e => rej(e.error || new Error('Recorder error'));
      setTimeout(() => rej(new Error('Timeout finalisasi')), 8000);
    });

  } catch(err) {
    setStatus('✕ Gagal buat video: ' + err.message, 'err');
    setProgress(0); setBusy(false);
  }
}

// ═══════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════
applyBtn.addEventListener('click', applyCSS);

// Ctrl+Enter atau Cmd+Enter untuk apply langsung dari textarea
cssEditor.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); applyCSS(); }
});

exportSvgBtn.addEventListener('click', exportSVG);
exportGifBtn.addEventListener('click', exportGIF);
exportMp4Btn.addEventListener('click', exportMP4);
</script>
</body>
</html>
